name: Build and Release sing-box rule-set

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install sing-box
        run: |
          curl -fsSL https://sing-box.app/install.sh | sudo sh

      - name: Check sing-box version
        run: |
          sing-box version

      - name: Compile rule-set
        run: |
          sing-box rule-set compile --output kino-pub.srs kino-pub.json

      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            && gh release upload "$TAG" kino-pub.srs --clobber --repo "$GITHUB_REPOSITORY" \
            || gh release create "$TAG" kino-pub.srs --title "$TAG" --generate-notes --repo "$GITHUB_REPOSITORY"
